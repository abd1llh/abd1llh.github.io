<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — abd1llh</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100svh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      padding: 2rem;
    }

    .err {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      text-align: center;
      animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .err-code {
      font-size: clamp(5rem, 18vw, 9rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--text);
      line-height: 1;
      opacity: 0.08;
      user-select: none;
    }

    .err-body {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      margin-top: -3rem;
    }

    .err-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--green);
      font-weight: 600;
    }

    .err-title {
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      font-weight: 700;
      color: var(--text);
      font-family: var(--font-sans, sans-serif);
      letter-spacing: -0.01em;
    }

    .err-desc {
      font-size: 13px;
      color: var(--muted);
      max-width: 34ch;
      line-height: 1.6;
    }

    .err-divider {
      width: 32px;
      height: 1px;
      background: var(--section-border);
      margin: 0.5rem 0;
    }

    .err-actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.6rem 1.25rem;
      border: 1px solid var(--green);
      background: transparent;
      color: var(--green);
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
      min-height: 44px;
    }
    .btn-home:hover {
      background: var(--green);
      color: #000;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      padding: 0.6rem 1.25rem;
      border: 1px solid var(--border-mid);
      background: transparent;
      color: var(--muted);
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 13px;
      text-decoration: none;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      min-height: 44px;
    }
    .btn-back:hover { border-color: var(--border-strong); color: var(--text); }
  </style>
</head>
<body>
  <div class="err">
    <div class="err-code" aria-hidden="true">404</div>
    <div class="err-body">
      <span class="err-label">Signal Lost</span>
      <h1 class="err-title">Endpoint Not Found</h1>
      <div class="err-divider"></div>
      <p class="err-desc">The requested resource could not be located on this system.</p>
    </div>
    <div class="err-actions">
      <a href="../index.html" class="btn-home">← Return Home</a>
      <button class="btn-back" onclick="history.back()">Go Back</button>
    </div>
  </div>
  <script>
    // Apply system theme
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const saved = localStorage.getItem('site_theme');
    document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
  </script>
</body>
</html>
